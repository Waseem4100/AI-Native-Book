# Docusaurus Configuration Schema for Physical AI Textbook
# This file defines the sidebar structure, navigation, and content organization

metadata:
  title: "Physical AI & Humanoid Robotics"
  tagline: "Bridging the Digital Brain and the Physical Body"
  url: "https://your-username.github.io"
  baseUrl: "/physical-ai-textbook/"
  favicon: "img/favicon.ico"
  organizationName: "your-org"
  projectName: "physical-ai-textbook"

# Sidebar navigation structure
sidebar:
  - type: doc
    id: intro
    label: "Introduction"

  - type: category
    label: "Module 1: ROS 2 Foundations"
    collapsed: false  # Keep first module expanded by default
    items:
      - module-1-ros2/index
      - module-1-ros2/ch1-middleware
      - module-1-ros2/ch2-nodes-topics
      - module-1-ros2/ch3-services-actions
      - module-1-ros2/ch4-rclpy-control
      - module-1-ros2/ch5-urdf-modeling
      - type: category
        label: "Exercises"
        collapsed: true
        items:
          - module-1-ros2/exercises/ex1-first-node
          - module-1-ros2/exercises/ex2-publisher-subscriber
          - module-1-ros2/exercises/ex3-urdf-humanoid

  - type: category
    label: "Module 2: Simulation"
    collapsed: true
    items:
      - module-2-simulation/index
      - module-2-simulation/ch1-digital-twin
      - module-2-simulation/ch2-gazebo-physics
      - module-2-simulation/ch3-unity-interaction
      - module-2-simulation/ch4-sensor-simulation
      - module-2-simulation/ch5-complete-simulation
      - type: category
        label: "Exercises"
        collapsed: true
        items:
          - module-2-simulation/exercises/ex1-gazebo-world
          - module-2-simulation/exercises/ex2-sensor-setup
          - module-2-simulation/exercises/ex3-unity-scene

  - type: category
    label: "Module 3: Isaac AI Brain"
    collapsed: true
    items:
      - module-3-isaac/index
      - module-3-isaac/ch1-intro-isaac
      - module-3-isaac/ch2-isaac-sim
      - module-3-isaac/ch3-isaac-ros
      - module-3-isaac/ch4-vslam
      - module-3-isaac/ch5-nav2
      - module-3-isaac/ch6-ai-brain
      - type: category
        label: "Exercises"
        collapsed: true
        items:
          - module-3-isaac/exercises/ex1-isaac-setup
          - module-3-isaac/exercises/ex2-vslam-demo
          - module-3-isaac/exercises/ex3-nav2-humanoid

  - type: category
    label: "Module 4: Vision-Language-Action"
    collapsed: true
    items:
      - module-4-vla/index
      - module-4-vla/ch1-vla-intro
      - module-4-vla/ch2-whisper
      - module-4-vla/ch3-llm-ros2
      - module-4-vla/ch4-cognitive-planning
      - module-4-vla/ch5-integration
      - type: category
        label: "Exercises"
        collapsed: true
        items:
          - module-4-vla/exercises/ex1-whisper-setup
          - module-4-vla/exercises/ex2-llm-actions
          - module-4-vla/exercises/ex3-full-pipeline

  - type: category
    label: "Capstone Project"
    collapsed: true
    items:
      - capstone/project-overview
      - capstone/architecture
      - capstone/implementation
      - capstone/evaluation
      - capstone/optional-hardware

  - type: category
    label: "Appendix"
    collapsed: true
    items:
      - appendix/prerequisites
      - appendix/troubleshooting
      - appendix/resources

  - type: doc
    id: glossary
    label: "Glossary"

# Navbar configuration
navbar:
  title: "Physical AI Textbook"
  logo:
    alt: "Physical AI Logo"
    src: "img/logo.svg"
  items:
    - type: "docSidebar"
      sidebarId: "tutorialSidebar"
      position: "left"
      label: "Textbook"
    - href: "https://github.com/your-org/physical-ai-textbook"
      label: "GitHub"
      position: "right"
    - type: "search"
      position: "right"

# Front-matter template for chapters
chapter_frontmatter:
  required_fields:
    - field: title
      type: string
      description: "Chapter title as it appears in content"
      example: "ROS 2 Middleware Fundamentals"

    - field: description
      type: string
      max_length: 160
      description: "SEO-friendly summary, also shown in search results"
      example: "Learn how ROS 2 uses DDS middleware for scalable robot communication."

    - field: sidebar_position
      type: integer
      description: "Order in sidebar navigation (1, 2, 3, ...)"
      example: 1

  optional_fields:
    - field: tags
      type: array[string]
      description: "Searchable keywords"
      example: ["ros2", "middleware", "dds"]

    - field: keywords
      type: array[string]
      description: "Additional SEO keywords"
      example: ["robot operating system", "distributed systems"]

    - field: sidebar_label
      type: string
      description: "Override sidebar display name (if different from title)"
      example: "ROS 2 Basics"

# Example chapter front-matter
example_frontmatter: |
  ---
  title: ROS 2 Middleware Fundamentals
  description: Learn how ROS 2 uses DDS middleware for scalable robot communication and why it replaced ROS 1's architecture.
  sidebar_position: 1
  tags: [ros2, middleware, dds, architecture]
  keywords: [robot operating system, distributed systems, real-time]
  ---

# Code block configuration
code_blocks:
  languages_enabled:
    - python
    - bash
    - yaml
    - xml
    - json
    - cpp
    - mermaid

  features:
    - showLineNumbers  # Display line numbers
    - title  # Show filename in code block header
    - highlight  # Syntax highlighting with Prism

  example: |
    ```python title="minimal_node.py" showLineNumbers
    import rclpy
    from rclpy.node import Node

    class MinimalNode(Node):
        def __init__(self):
            super().__init__('minimal_node')
    ```

# Mermaid diagram configuration
mermaid:
  theme: default  # or 'neutral', 'dark', 'forest'
  supported_types:
    - graph  # Flowcharts
    - sequenceDiagram  # Sequence diagrams
    - classDiagram  # Class diagrams
    - stateDiagram  # State diagrams
    - erDiagram  # Entity-relationship diagrams

  example: |
    ```mermaid
    graph LR
        A[Voice Command] --> B[Whisper]
        B --> C[LLM Planner]
        C --> D[ROS 2 Actions]
        D --> E[Robot Execution]
    ```

# Search configuration
search:
  enabled: true
  provider: "algolia"  # or "local" for offline search
  index_all_content: true
  search_fields:
    - title
    - description
    - content
    - tags
    - keywords

# Quality gate checks (automated validation)
quality_gates:
  - name: code_execution_test
    enabled: true
    description: "All code examples must execute without errors in target environment"
    environments:
      - ros2-humble
      - gazebo-11
      - isaac-sim

  - name: link_validation
    enabled: true
    description: "All internal links and cross-references must be valid"
    check_external_links: false

  - name: word_count_check
    enabled: true
    description: "Chapters must not exceed 3000 words"
    max_words_per_chapter: 3000

  - name: front_matter_validation
    enabled: true
    description: "All required front-matter fields must be present"
    required_fields:
      - title
      - description
      - sidebar_position

  - name: api_verification_check
    enabled: true
    description: "All code examples must have verified: true flag"
    fail_on_unverified: true

# Build configuration
build:
  output_dir: "build"
  static_dir: "static"
  docs_dir: "docs"
  markdown_extensions:
    - tables
    - code-tabs
    - admonitions

# Deployment configuration
deployment:
  platform: "github-pages"
  branch: "gh-pages"
  workflow: ".github/workflows/deploy.yml"
  build_command: "npm run build"
  deploy_command: "gh-pages -d build"

# Theme configuration
theme:
  primary_color: "#2e8555"  # Green for robotics
  secondary_color: "#25c2a0"
  font_family: "'Inter', sans-serif"
  code_font: "'Fira Code', monospace"

# Footer configuration
footer:
  style: "dark"
  links:
    - title: "Textbook"
      items:
        - label: "Introduction"
          to: "/"
        - label: "Module 1"
          to: "/module-1-ros2/"
        - label: "Glossary"
          to: "/glossary"

    - title: "Resources"
      items:
        - label: "ROS 2 Documentation"
          href: "https://docs.ros.org/en/humble/"
        - label: "Gazebo Documentation"
          href: "http://classic.gazebosim.org/"
        - label: "Isaac Sim Documentation"
          href: "https://docs.omniverse.nvidia.com/isaacsim/"

    - title: "Community"
      items:
        - label: "GitHub"
          href: "https://github.com/your-org/physical-ai-textbook"
        - label: "Discussions"
          href: "https://github.com/your-org/physical-ai-textbook/discussions"

  copyright: "Copyright © 2025 Physical AI Textbook. Built with Docusaurus."

# Plugins
plugins:
  - "@docusaurus/plugin-content-docs"  # Core docs plugin
  - "@docusaurus/plugin-content-pages"  # Static pages
  - "@docusaurus/plugin-sitemap"  # SEO sitemap
  - "@docusaurus/theme-mermaid"  # Mermaid diagrams
  - "@docusaurus/plugin-google-gtag"  # Analytics (optional)

# Presets
presets:
  - name: "classic"
    docs:
      routeBasePath: "/"  # Docs-only mode
      sidebarPath: "./sidebars.js"
      editUrl: "https://github.com/your-org/physical-ai-textbook/edit/main/"
      showLastUpdateAuthor: true
      showLastUpdateTime: true
    blog: false  # Disable blog
    theme:
      customCss: "./src/css/custom.css"
